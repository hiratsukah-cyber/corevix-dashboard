    body {

      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .spinner {
      width: 40px;
      height: 40px;

      border-top-color: #4a90e2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;

    @keyframes spin {
      to { transform: rotate(360deg); }

    a {
      color: #4a90e2;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
