<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoreVix ダッシュボード</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }
    .frame-wrapper {
      position: fixed;
      top: -40px;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100vh + 40px);
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="frame-wrapper">
    <iframe src="https://script.google.com/macros/s/AKfycbyfHYDKWe_2n1j3S3aGiqBai3daBmK9nyHff3aEBX_8fkH2Dqc65LqVvhlutY2HfRCV/exec"
            allow="fullscreen"></iframe>
  </div>
</body>
</html>
